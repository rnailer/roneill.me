  <line x1="48" y1="168" x2="712" y2="168" stroke="#F0EDE7" stroke-width="1.5"></line>

  
  <text x="48" y="208" font-size="11" font-weight="700" letter-spacing="1.5" fill="#EE5622">EXERCISE · THETA-22 (NSO) · 50 OPTIONS</text>
  <text x="48" y="242" font-size="26" font-weight="600" fill="#1A1310">What would you like to receive?</text>
  <text x="48" y="270" font-size="15" fill="#6B675F">Choose the outcome you want — we&#39;ll handle the rest.</text>

  
  <rect x="48" y="296" width="320" height="176" rx="14" fill="#FEF3EE" stroke="#EE5622" stroke-width="2"></rect>
