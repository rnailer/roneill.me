  <text x="76" y="440" font-size="14" fill="#6B675F">proceeds, after costs and taxes.</text>

  
  <rect x="392" y="296" width="320" height="176" rx="14" fill="#FFFFFF" stroke="#E2DDD5" stroke-width="1.5"></rect>
