  <rect x="16" y="14" width="728" height="532" rx="18" fill="#FFFFFF" stroke="#ECE8E1" stroke-width="1.5" filter="url(#cardShadow2)"></rect>

  
  <rect x="48" y="44" width="14" height="14" rx="3" fill="#EE5622"></rect>
