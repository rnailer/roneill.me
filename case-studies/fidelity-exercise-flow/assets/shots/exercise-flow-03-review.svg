  <text x="688" y="62" font-size="13" font-weight="600" fill="#2E7D55" text-anchor="end">▲1.2%</text>

  
  <line x1="150" y1="112" x2="610" y2="112" stroke="#1A1310" stroke-width="2"></line>
  <circle cx="150" cy="112" r="13" fill="#1A1310"></circle>
