  <line x1="48" y1="168" x2="712" y2="168" stroke="#F0EDE7" stroke-width="1.5"></line>

  <text x="48" y="206" font-size="20" font-weight="600" fill="#1A1310">Review and submit</text>

  
  <text x="48" y="244" font-size="14" fill="#6B675F">Estimated sale value</text>
  <text x="360" y="244" font-size="14" font-weight="600" fill="#1A1310" text-anchor="end">$2,400</text>
  <text x="48" y="276" font-size="14" fill="#6B675F">Option cost</text>
  <text x="360" y="276" font-size="14" font-weight="600" fill="#1A1310" text-anchor="end">−$1,000</text>
  <line x1="48" y1="294" x2="360" y2="294" stroke="#F0EDE7" stroke-width="1.5"></line>
