<svg viewBox="0 0 760 560" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, &#39;Segoe UI&#39;, sans-serif">
  <defs>
    <filter id="cardShadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#1A1310" flood-opacity="0.08"></feDropShadow>
    </filter>
  </defs>

  <rect x="16" y="14" width="728" height="532" rx="18" fill="#FFFFFF" stroke="#ECE8E1" stroke-width="1.5" filter="url(#cardShadow3)"></rect>

  
  <rect x="48" y="44" width="14" height="14" rx="3" fill="#EE5622"></rect>
  <text x="74" y="55" font-size="14" font-weight="600" fill="#1A1310">Stock options</text>
  <rect x="508" y="40" width="204" height="34" rx="17" fill="#F6F4F0"></rect>
