  <text x="360" y="416" font-size="14" font-weight="600" fill="#1A1310" text-anchor="end">−$15</text>

  
  <rect x="404" y="222" width="308" height="120" rx="14" fill="#FEF3EE" stroke="#F6C9B6" stroke-width="1.5"></rect>
